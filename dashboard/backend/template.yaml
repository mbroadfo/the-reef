AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: The Reef Dashboard API

Parameters:
  MongoUri:
    Type: String
    NoEcho: true
    Description: MongoDB Atlas connection string
  MongoDb:
    Type: String
    Default: the_reef
    Description: Atlas database name

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        MONGODB_URI: !Ref MongoUri
        MONGODB_DB: !Ref MongoDb

Resources:

  ReefHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  ReefApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Description: The Reef dashboard read-only API
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReefHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: Base URL for the Reef dashboard API
    Value: !Sub "https://${ReefHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: ReefApiUrl
