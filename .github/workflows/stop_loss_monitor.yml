name: 🛑 Stop-Loss Monitor — Apex Shark Autonomous Exits

on:
  schedule:
    # Every 30 minutes during market hours, Mon–Fri
    - cron: "*/30 13-20 * * 1-5"
  workflow_dispatch:

jobs:
  check_stops:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Check and execute stop-losses
        working-directory: the_reef
        env:
          MONGODB_URI: "mongodb+srv://mbroadfo_db_user:${{ secrets.MONGODB_PASSWORD }}@reef-m0.1sxeyjd.mongodb.net/?authSource=admin&appName=reef-m0"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: uv run python -m the_reef.main stops
