name: Scanner - Detect Signals

on:
  schedule:
    # Every 20 minutes, Mon-Fri, 9:30am-4:00pm ET (13:30-21:00 UTC)
    - cron: "*/20 13-20 * * 1-5"
    - cron: "30 13 * * 1-5"   # catch 9:30am ET open exactly
  workflow_dispatch:           # Manual trigger from GitHub UI
    inputs:
      watchlist:
        description: "Comma-separated tickers (leave blank for default)"
        required: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      actions: write
      contents: read
    outputs:
      signals_found: ${{ steps.run_scan.outputs.signals_found }}
      signal_count: ${{ steps.run_scan.outputs.signal_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Run scanner
        id: run_scan
        working-directory: the_reef
        env:
          MONGODB_URI: "mongodb+srv://mbroadfo_db_user:${{ secrets.MONGODB_PASSWORD }}@reef-m0.1sxeyjd.mongodb.net/?authSource=admin&appName=reef-m0"
          WATCHLIST: ${{ github.event.inputs.watchlist }}
        run: |
          OUTPUT=$(uv run python -m the_reef.scanner.monitor ${WATCHLIST:-})
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "SIGNALS_FOUND=true"; then
            echo "signals_found=true" >> $GITHUB_OUTPUT
            COUNT=$(echo "$OUTPUT" | grep "SIGNAL_COUNT=" | cut -d= -f2)
            echo "signal_count=${COUNT:-0}" >> $GITHUB_OUTPUT
            TOP_TICKER=$(echo "$OUTPUT" | grep "^TOP_TICKER=" | cut -d= -f2)
            TOP_PRIORITY=$(echo "$OUTPUT" | grep "^TOP_PRIORITY=" | cut -d= -f2)
            TOP_SIGNAL=$(echo "$OUTPUT" | grep "^TOP_SIGNAL=" | cut -d= -f2)
            echo "top_ticker=$TOP_TICKER" >> $GITHUB_OUTPUT
            echo "top_priority=${TOP_PRIORITY:-0}" >> $GITHUB_OUTPUT
            echo "top_signal=$TOP_SIGNAL" >> $GITHUB_OUTPUT
            # Only auto-dispatch for high-priority signals and if a candidate passed guards
            if [ -n "$TOP_TICKER" ] && [ "${TOP_PRIORITY:-0}" -ge 9 ]; then
              echo "should_dispatch=true" >> $GITHUB_OUTPUT
            else
              echo "should_dispatch=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "signals_found=false" >> $GITHUB_OUTPUT
            echo "signal_count=0" >> $GITHUB_OUTPUT
            echo "should_dispatch=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-dispatch deep dive
        if: steps.run_scan.outputs.should_dispatch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const ticker = '${{ steps.run_scan.outputs.top_ticker }}'
            const signal = '${{ steps.run_scan.outputs.top_signal }}'
            const priority = '${{ steps.run_scan.outputs.top_priority }}'
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deep_dive.yml',
              ref: 'master',
              inputs: { ticker: ticker }
            })
            console.log(`Auto-dispatched deep dive: ${ticker} | ${signal} | priority ${priority}`)
