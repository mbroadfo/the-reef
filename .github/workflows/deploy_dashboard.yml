name: Deploy Dashboard
# Required GitHub Secrets:
#   TERRAFORM_AWS_ACCESS_KEY_ID / TERRAFORM_AWS_SECRET_ACCESS_KEY — Terraform (infra job)
#   DEPLOY_AWS_ACCESS_KEY_ID / DEPLOY_AWS_SECRET_ACCESS_KEY       — S3 sync + CF invalidation
#   REEF_S3_BUCKET     — S3 bucket name (passed as TF_VAR_bucket_name and sync target)
#   MONGODB_PASSWORD   — used to construct the SSM MongoDB URI
#   CLOUDFRONT_DIST_ID — NOT a secret; sourced from terraform output cloudfront_distribution_id
on:
  push:
    branches: [master]
    paths: ['dashboard/**']
  workflow_dispatch:

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

env:
  AWS_DEFAULT_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Terraform: provision all AWS infrastructure ────────────────────────
  infra:
    runs-on: ubuntu-latest
    outputs:
      api_url:     ${{ steps.out.outputs.api_url }}
      cf_dist_id:  ${{ steps.out.outputs.cf_dist_id }}
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.TERRAFORM_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Lambda package
        working-directory: dashboard/backend
        run: |
          pip install -r requirements.txt -t package/ -q
          cp handler.py package/
          cd package && zip -r ../lambda.zip . -x "*.pyc" -x "*__pycache__*"
          rm -rf ../package/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: dashboard/infra
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=reef-tf-state" \
            -backend-config="key=reef-dashboard/terraform.tfstate" \
            -backend-config="region=us-west-2"

      - name: Debug state
        working-directory: dashboard/infra
        run: |
          aws sts get-caller-identity
          echo "--- S3 bucket access ---"
          aws s3 ls s3://reef-tf-state/ --region us-west-2
          echo "--- .terraform backend config ---"
          cat .terraform/terraform.tfstate 2>/dev/null || echo "no .terraform/terraform.tfstate"
          echo "--- terraform state list ---"
          terraform state list || echo "(empty)"

      - name: Terraform Apply
        working-directory: dashboard/infra
        run: terraform apply -auto-approve
        env:
          TF_VAR_bucket_name: ${{ secrets.REEF_S3_BUCKET }}

      - name: Capture outputs
        id: out
        working-directory: dashboard/infra
        run: |
          echo "api_url=$(terraform output -raw api_url)"        >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Print ACM DNS validation CNAME
        working-directory: dashboard/infra
        run: |
          echo "=== ACM Certificate DNS Validation ==="
          echo "Add this CNAME to your DNS provider:"
          echo "  Name:  $(terraform output -raw acm_validation_cname_name)"
          echo "  Value: $(terraform output -raw acm_validation_cname_value)"
          echo "======================================="

  # ── 2. Secrets: GitHub Secrets → Parameter Store ──────────────────────────
  secrets:
    runs-on: ubuntu-latest
    needs: infra
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Write secrets to Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/reef/prod/secrets" \
            --type "SecureString" \
            --value '{"MONGODB_URI":"mongodb+srv://mbroadfo_db_user:${{ secrets.MONGODB_PASSWORD }}@reef-m0.1sxeyjd.mongodb.net/?authSource=admin&appName=reef-m0","MONGODB_DB":"the_reef"}' \
            --overwrite

  # ── 3. Frontend: build + sync + invalidate ────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    needs: [infra, secrets]
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install and build
        working-directory: dashboard/frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ needs.infra.outputs.api_url }}

      - name: Sync to S3
        run: |
          aws s3 sync dashboard/frontend/dist/ \
            s3://${{ secrets.REEF_S3_BUCKET }}/ \
            --delete --cache-control "public,max-age=300"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.infra.outputs.cf_dist_id }} \
            --paths "/*"
