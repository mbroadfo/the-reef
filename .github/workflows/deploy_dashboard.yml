name: Deploy Dashboard
on:
  push:
    branches: [master]
    paths: ['dashboard/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Lambda ────────────────────────────────────────────────────────────
      - name: Build Lambda package
        working-directory: dashboard/backend
        run: |
          pip install -r requirements.txt -t package/ -q
          cp handler.py package/
          cd package && zip -r ../lambda.zip . -x "*.pyc" -x "*__pycache__*"
          rm -rf ../package/

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name reef-dashboard \
            --zip-file fileb://dashboard/backend/lambda.zip \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      # ── Frontend ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install deps
        working-directory: dashboard/frontend
        run: npm ci

      - name: Build
        working-directory: dashboard/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.REEF_API_URL }}

      - name: Sync to S3
        run: |
          aws s3 sync dashboard/frontend/dist/ s3://${{ secrets.REEF_S3_BUCKET }}/ \
            --delete --cache-control "public,max-age=300"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.REEF_CF_DIST_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
