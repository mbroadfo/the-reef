name: Deploy Dashboard
on:
  push:
    branches: [master]
    paths: ['dashboard/**']
  workflow_dispatch:

jobs:
  # ── Terraform: S3 bucket + Lambda + API Gateway ───────────────────────────
  infra:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.tf_out.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Lambda package
        working-directory: dashboard/backend
        run: |
          pip install -r requirements.txt -t package/ -q
          cp handler.py package/
          cd package
          zip -r ../lambda.zip . -x "*.pyc" -x "*__pycache__*"
          cd ..
          rm -rf package/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: dashboard/infra
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Terraform Apply
        working-directory: dashboard/infra
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_bucket_name: ${{ secrets.REEF_S3_BUCKET }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

      - name: Capture API URL
        id: tf_out
        working-directory: dashboard/infra
        run: echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  # ── Frontend: build React SPA + sync to S3 ───────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install deps
        working-directory: dashboard/frontend
        run: npm ci

      - name: Build
        working-directory: dashboard/frontend
        run: npm run build
        env:
          # Use Terraform output if available; fall back to stored secret
          VITE_API_URL: ${{ needs.infra.outputs.api_url || secrets.REEF_API_URL }}

      - name: Sync to S3
        working-directory: dashboard/frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.REEF_S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=300"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
