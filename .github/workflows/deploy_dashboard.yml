name: Deploy Dashboard to S3
on:
  push:
    branches: [master]
    paths: ['dashboard/frontend/**']
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install deps
        working-directory: dashboard/frontend
        run: npm ci

      - name: Build
        working-directory: dashboard/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.REEF_API_URL }}

      - name: Deploy to S3
        working-directory: dashboard/frontend
        run: aws s3 sync dist/ s3://${{ secrets.REEF_S3_BUCKET }}/ --delete --cache-control "public,max-age=300"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  deploy-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: SAM Build
        working-directory: dashboard/backend
        run: sam build

      - name: SAM Deploy
        working-directory: dashboard/backend
        run: |
          sam deploy \
            --stack-name reef-dashboard-api \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --parameter-overrides \
              MongoUri="${{ secrets.MONGODB_URI }}" \
              MongoDb="${{ secrets.MONGODB_DB || 'the_reef' }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
