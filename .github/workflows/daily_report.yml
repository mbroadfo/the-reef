name: 📊 Daily Performance Report

on:
  schedule:
    # 4:30pm ET Mon–Fri (21:30 UTC during EDT / 22:30 during EST)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Generate and print performance report
        working-directory: the_reef
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: uv run python main.py report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: the_reef/data/reports/
          retention-days: 365
