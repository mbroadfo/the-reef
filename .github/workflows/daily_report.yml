name: 📊 Daily Performance Report

on:
  schedule:
    # 4:30pm ET Mon–Fri (21:30 UTC during EDT / 22:30 during EST)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run (default: report)"
        required: false
        default: "report"

jobs:
  report:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Generate and print performance report
        working-directory: the_reef
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMS_RECIPIENT: ${{ secrets.SMS_RECIPIENT }}
          COMMAND: ${{ github.event.inputs.command || 'report' }}
        run: uv run python -m the_reef.main $COMMAND

