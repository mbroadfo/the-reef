name: "Deep Dive - Shark Panel Analysis"

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker symbol (leave blank to use top signal from Atlas)"
        required: false
      signal_type:
        description: "Signal type: PRICE_BREAKOUT, VOLUME_SPIKE, NEWS_SENTIMENT, etc."
        required: false
        default: "MANUAL"
      signal_value:
        description: "Signal value (pct change or volume ratio)"
        required: false
      price_override:
        description: "Price override for private companies or test scenarios"
        required: false

jobs:
  deep_dive:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Run shark panel deep-dive
        working-directory: the_reef
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MONGODB_URI: "mongodb+srv://mbroadfo_db_user:${{ secrets.MONGODB_PASSWORD }}@reef-m0.1sxeyjd.mongodb.net/?authSource=admin&appName=reef-m0"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMS_RECIPIENT: ${{ secrets.SMS_RECIPIENT }}
          TICKER_OVERRIDE: ${{ github.event.inputs.ticker }}
          SIGNAL_TYPE: ${{ github.event.inputs.signal_type }}
          SIGNAL_VALUE: ${{ github.event.inputs.signal_value }}
          PRICE_OVERRIDE: ${{ github.event.inputs.price_override }}
        run: |
          if [ -n "$TICKER_OVERRIDE" ]; then
            echo "Manual dive on: $TICKER_OVERRIDE"
            uv run python -m the_reef.main dive "$TICKER_OVERRIDE"
          else
            TOP_TICKER=$(uv run python -m the_reef.scanner.pick_signal)
            if [ -n "$TOP_TICKER" ]; then
              echo "Diving on top signal: $TOP_TICKER"
              uv run python -m the_reef.main dive "$TOP_TICKER"
            else
              echo "No qualifying signals -- all blocked by open positions or recent dives"
            fi
          fi
