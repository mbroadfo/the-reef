name: 🦈🦈 Deep Dive — Shark Panel Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Override ticker (leave blank to use top signal from Atlas)"
        required: false

jobs:
  deep_dive:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: the_reef
        run: uv sync

      - name: Run shark panel deep-dive
        working-directory: the_reef
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMS_RECIPIENT: ${{ secrets.SMS_RECIPIENT }}
          TICKER_OVERRIDE: ${{ github.event.inputs.ticker }}
        run: |
          if [ -n "$TICKER_OVERRIDE" ]; then
            echo "Manual dive on: $TICKER_OVERRIDE"
            uv run python -m the_reef.main dive "$TICKER_OVERRIDE"
          else
            # Pick top affordable signal — skip stocks where even 1 share exceeds max position
            TOP_TICKER=$(uv run python -c "
from the_reef.scanner.monitor import load_signals
from the_reef.brokerage.the_tank import TheTank
tank = TheTank()
max_position = tank.max_position_size(10)
signals = load_signals(limit=20)
affordable = [s for s in signals if s.price <= max_position]
print(affordable[0].ticker if affordable else '')
")
            if [ -n "$TOP_TICKER" ]; then
              echo "Diving on top affordable signal: $TOP_TICKER"
              uv run python -m the_reef.main dive "$TOP_TICKER"
            else
              echo "No affordable signals in Atlas — all signals exceed max position size"
            fi
          fi

