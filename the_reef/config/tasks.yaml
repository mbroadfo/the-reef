# The Reef — Task Definitions
# Tasks run sequentially; each feeds into the next via context.

hunter_research:
  description: >
    You have been activated by the scanner. Signal detected on {ticker}:
    {signal_type} with trigger value {signal_value} at price ${current_price}.
    Timestamp: {scan_timestamp}.

    Conduct a deep-dive investigation:
    1. Use market data tools to get current price, volume, RSI, and 52-week range
    2. Use price history tool to understand recent trend
    3. Search for latest news, analyst coverage, and any catalysts
    4. Build a clear trade thesis: what is happening and why does it matter?
    5. Specify a suggested entry range, stop-loss level, and target price
    6. Rate your own confidence: HIGH / MEDIUM / LOW

    Be specific. Numbers, not narratives.
  expected_output: >
    A structured hunter report containing:
    - Signal summary (what triggered this, key metrics)
    - Current technicals (price, RSI, volume ratio, trend)
    - Trade thesis (1-3 sentences on WHY this is interesting)
    - Suggested entry range, stop-loss, and price target
    - Hunter confidence: HIGH / MEDIUM / LOW
    - Any red flags or caveats you spotted
  # agent is assigned dynamically in crew.py via select_hunter(signal_type)
  # Do NOT hardcode agent here

value_analysis:
  description: >
    You are Value Shark. The hunter has flagged {ticker} at ${current_price}.

    You must research and report SPECIFIC numbers:
    1. Current P/E ratio vs sector median P/E
    2. Revenue growth rate (YoY) — accelerating or decelerating?
    3. Gross margin trend — expanding or compressing?
    4. Your estimate of fair value per share
    5. Upside/downside % from current price to your fair value estimate

    Use web search to find current financials if needed. Do not estimate —
    find real numbers. End with: CHEAP (>15% upside) / FAIR (0-15%) /
    EXPENSIVE (negative upside to fair value)
  expected_output: >
    Exactly five data points as listed above, followed by valuation verdict:
    CHEAP/FAIR/EXPENSIVE and a one-sentence explanation of the single biggest
    fundamental risk to the bull case.
  agent: value_shark
  context:
    - hunter_research

macro_analysis:
  description: >
    You are Macro Shark. Assess the environment for a trade in {ticker} RIGHT NOW.

    Answer these specifically:
    1. What sector is {ticker} in? Is that sector in favor or out of favor vs
       the S&P 500 over the last 30 days?
    2. Is {ticker} rate-sensitive? (High P/E growth stock = yes, value/commodity
       = less so). Which way are rates moving?
    3. Current VIX level — is risk appetite open or closed?
       (VIX <15 = open, 15-20 = neutral, >20 = closed)
    4. Any sector-specific macro headwinds right now?
       (tariffs, regulation, supply chain)

    End with: GO (macro supports trade) / CAUTION (mixed signals) /
    AVOID (macro headwind)
  expected_output: >
    Four specific answers as listed, sector momentum assessment, rate sensitivity
    verdict, VIX context, and final macro verdict: GO/CAUTION/AVOID
  agent: macro_shark
  context:
    - hunter_research

contrarian_challenge:
  description: >
    You are Contrarian Shark. Your teammates are excited about {ticker}.
    Your job: find what they missed.

    Research and answer:
    1. Short interest % of float — is this crowded?
       (>15% = crowded, 5-15% = moderate, <5% = light)
    2. Has there been recent insider selling? (Check SEC Form 4 filings)
    3. Any recent secondary offerings or dilution?
    4. What is the BEAR thesis in one sentence?
    5. What catalyst could cause a -20% move?

    Worry score 1-10:
    1-3 = minor concerns, proceed
    4-6 = real risks, size down
    7-8 = significant red flags, half position only
    9-10 = PASS regardless of bull case
  expected_output: >
    Five specific answers as listed above. Worry score: X/10 with one-sentence
    justification. Final verdict: PROCEED / CAUTION (half size) / AVOID
  agent: contrarian_shark
  context:
    - hunter_research
    - value_analysis
    - macro_analysis

apex_decision:
  description: >
    You are Apex Shark — final authority.

    You have four reports on {ticker} at ${current_price}.
    Signal: {signal_type} (value: {signal_value})

    DECISION FRAMEWORK:

    STEP 1: Get Portfolio State — check cash and positions before anything else.

    STEP 2: Score the panel:
    - Hunter confidence HIGH=3, MEDIUM=2, LOW=1
    - Value verdict CHEAP=3, FAIR=2, EXPENSIVE=0
    - Macro verdict GO=3, CAUTION=1, AVOID=0
    - Contrarian worry: subtract (worry_score / 10) * 3

    Panel score range: 0-9
    Score >=6: BUY full size (conviction x $150/share budget)
    Score 4-5: BUY half size
    Score <4: PASS

    STEP 3: Execute via tools if buying.

    STEP 4: Run stop-loss check on all positions.

    STEP 5: State which shark you weighted most and why.
    The Contrarian's worry score is a position-sizer, not a veto. Only AVOID
    from Contrarian = PASS.
  expected_output: >
    Decision: BUY [X shares] | PASS
    Panel score: X/9
    Conviction: X/10
    Weighted most: [shark name] because [reason]
    Stop-loss: $X | Target: $X
    Positions reviewed: [list any stops triggered]
    Human action: what to do in your real account
  agent: apex_shark
  context:
    - hunter_research
    - value_analysis
    - macro_analysis
    - contrarian_challenge
