# The Reef — Task Definitions
# Sequential pipeline: hunt -> hunt_bid -> research -> research_bid ->
# macro -> macro_bid -> sentiment -> sentiment_bid ->
# contrarian -> contrarian_bid -> risk -> risk_bid ->
# wildcard -> wildcard_bid -> apex
# hunter_research.agent is overridden dynamically
# in crew.py based on signal_type routing.

hunter_research:
  description: >
    You have been activated by the scanner.
    Signal: {signal_type} (value: {signal_value})
    on {ticker} at ${current_price}.
    Timestamp: {scan_timestamp}.
    {ipo_note}

    Conduct your domain investigation:
    1. Get current price, volume, RSI, 52-week range
    2. Get recent price history — what is the trend?
    3. Search for latest news and any catalysts
    4. Build your trade thesis: what is happening
       and why does it matter RIGHT NOW?
    5. Specify entry range, stop-loss, target price
    6. Rate your confidence: HIGH / MEDIUM / LOW

    Also: does this signal suggest any related
    tickers worth nominating beyond {ticker}?
  expected_output: >
    Structured hunter report:
    - Signal summary (what triggered, key metrics)
    - Current technicals or fundamentals (your domain)
    - Trade thesis (1-3 sentences, WHY this matters)
    - Entry range, stop-loss, target price
    - Confidence: HIGH / MEDIUM / LOW
    - Related ticker nominations (if any)
    - Red flags or caveats
  agent: hunter_shark

hunter_bid:
  description: >
    Your {ticker} analysis is complete.
    One action only: call "Submit Conviction Bid".
    Positive bid (1-10) = you are long on {ticker}.
    Negative bid (-1 to -10) = you oppose this trade.
    Magnitude = your confidence level.
    Rationale: one sentence based on your analysis.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: hunter_shark
  context:
    - hunter_research

research_analysis:
  description: >
    Review the hunter's report on {ticker} at
    ${current_price}. Provide fundamental analysis.
    {ipo_note}

    Report SPECIFIC numbers:
    1. Current P/E vs sector median P/E
    2. Revenue growth rate YoY — accelerating or
       decelerating?
    3. Gross margin trend — expanding or compressing?
    4. Your fair value estimate per share
    5. Upside/downside % to your fair value

    Is there an earnings catalyst or product event
    within 30 days that could move the stock?

    End with: CHEAP (>15% upside) / FAIR (0-15%) /
    EXPENSIVE (negative upside to fair value)
  expected_output: >
    Five specific data points as listed.
    Earnings catalyst: YES [date + event] or NO.
    Valuation verdict: CHEAP / FAIR / EXPENSIVE.
    One-sentence bottom line on fundamental risk.
  agent: research_shark
  context:
    - hunter_research

research_bid:
  description: >
    Your {ticker} fundamental analysis is complete.
    One action only: call "Submit Conviction Bid".
    CHEAP → high positive bid, FAIR → moderate positive,
    EXPENSIVE → negative bid.
    Magnitude = your valuation conviction.
    Rationale: one sentence on the fundamental case.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: research_shark
  context:
    - research_analysis

macro_analysis:
  description: >
    Assess macro and sector context for {ticker}.

    Answer specifically:
    1. What sector is {ticker} in? In favor or out
       of favor vs S&P 500 last 30 days?
    2. Is {ticker} rate-sensitive? Which way are
       rates moving — help or hurt?
    3. Current VIX: <15 risk-on / 15-20 neutral
       / >20 risk-off — which regime?
    4. Any sector-specific macro headwinds right now?

    End with: GO / CAUTION / AVOID + one sentence.

    Also: do you see a macro-driven opportunity in
    ANY sector right now, independent of {ticker}?
    If yes, call "Nominate Ticker" with the ticker,
    your 2-line thesis, source="macro_shark", and
    entry range. Then report the nomination here.
  expected_output: >
    Four specific answers as listed.
    Macro verdict: GO / CAUTION / AVOID + reason.
    Unsolicited nomination (optional): ticker +
    2-line thesis if a macro opportunity is visible.
    Confirm: "Nominated [TICKER]" or "No nomination."
  agent: macro_shark
  context:
    - hunter_research

macro_bid:
  description: >
    Your {ticker} macro assessment is complete.
    One action only: call "Submit Conviction Bid".
    Map your verdict directly to your bid:
    GO → positive bid, CAUTION → bid near 0 (+1 to -1),
    AVOID → negative bid.
    Magnitude = conviction in the macro call.
    Rationale: one sentence on macro context.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: macro_shark
  context:
    - macro_analysis

sentiment_analysis:
  description: >
    Assess sentiment and narrative for {ticker}.

    Check and report:
    1. Recent news tone (last 7 days): IMPROVING /
       NEUTRAL / DETERIORATING — cite 1-2 headlines
    2. Analyst activity: upgrades or downgrades
       in the last 30 days?
    3. Social/retail interest: rising or fading?
    4. Insider activity: recent Form 4 filings?

    Sentiment score: BULLISH / NEUTRAL / BEARISH.

    Also: any ticker where you see a narrative shift
    that hasn't hit price yet? If yes, call
    "Nominate Ticker" with the ticker, your 2-line
    thesis, source="sentiment_shark", and entry range.
    Then report the nomination here.
  expected_output: >
    Four specific answers as listed.
    Sentiment score: BULLISH / NEUTRAL / BEARISH.
    Unsolicited nomination (optional): ticker +
    2-line thesis if a narrative shift is visible.
    Confirm: "Nominated [TICKER]" or "No nomination."
  agent: sentiment_shark
  context:
    - hunter_research

sentiment_bid:
  description: >
    Your {ticker} sentiment analysis is complete.
    One action only: call "Submit Conviction Bid".
    BULLISH → positive bid, NEUTRAL → bid near 0,
    BEARISH → negative bid.
    Magnitude = strength of the narrative signal.
    Rationale: one sentence on narrative direction.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: sentiment_shark
  context:
    - sentiment_analysis

contrarian_challenge:
  description: >
    Stress-test the bull case for {ticker}.
    You have seen hunter, research, macro, sentiment.
    Find what everyone else missed.
    {ipo_note}

    Research and answer:
    1. Short interest % of float — crowded?
       >15% crowded, 5-15% moderate, <5% light
    2. Recent insider selling? (SEC Form 4)
    3. Secondary offerings or dilution risk?
    4. The bear thesis in one sentence
    5. What catalyst could cause a -20% move?

    Worry score 1-10:
    1-4: minor concerns, normal sizing
    5-6: real risks, flag SIZE-DOWN-25
    7-8: significant flags, flag SIZE-DOWN-50
    9-10: risk/reward broken, flag SIZE-DOWN-75

    YOU DO NOT HAVE VETO POWER.
    Only Apex makes the final call.
    Make sure Apex has the full picture.
  expected_output: >
    Five specific answers as listed.
    Worry score: X/10 + one-sentence justification.
    Sizing flag: NORMAL / SIZE-DOWN-25 /
    SIZE-DOWN-50 / SIZE-DOWN-75.
    Final: "Decision is Apex's."
  agent: contrarian_shark
  context:
    - hunter_research
    - research_analysis
    - macro_analysis
    - sentiment_analysis

contrarian_bid:
  description: >
    Your {ticker} stress-test is complete.
    One action only: call "Submit Conviction Bid".
    Map your worry score to your bid:
    worry 1-4 → small positive bid if you see upside
    worry 5-6 → small negative bid (-1 to -3)
    worry 7-10 → negative bid equal to your worry score
    Rationale: one sentence on the key risk you found.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: contrarian_shark
  context:
    - contrarian_challenge

risk_assessment:
  description: >
    Assess portfolio-level impact before Apex commits
    capital to {ticker}. Use "Get Portfolio State".

    Answer:
    1. Portfolio heat: total open position value as
       % of starting capital.
       <50% cool, 50-75% warm, 75-90% hot, >90% red
    2. Sector concentration: what % is already in
       {ticker}'s sector? Flag if adding takes it
       above 40%.
    3. Correlation risk: do existing positions move
       with {ticker}? Flag if yes.
    4. Stop-loss audit: are all existing stops still
       valid at current prices?

    Heat score 1-10:
    1-4: room available, no concern
    5-6: warming, suggest SIZE-DOWN-25
    7-8: hot, suggest SIZE-DOWN-50
    9-10: overheated, suggest SIZE-DOWN-75

    YOU DO NOT HAVE VETO POWER.
    Only Apex makes the final call.
  expected_output: >
    Four specific answers as listed.
    Heat score: X/10 + one-sentence justification.
    Sizing suggestion: NORMAL / SIZE-DOWN-25 /
    SIZE-DOWN-50 / SIZE-DOWN-75.
    Stop audit: ALL VALID or list needing adjustment.
    Final: "Decision is Apex's."
  agent: risk_shark
  context:
    - hunter_research
    - contrarian_challenge

risk_bid:
  description: >
    Your {ticker} heat assessment is complete.
    One action only: call "Submit Conviction Bid".
    Heat 1-6 → positive bid (1-5) supporting the trade.
    Heat 7-10 → negative bid equal to your heat score.
    Magnitude = confidence in the heat assessment.
    Rationale: one sentence on portfolio impact.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: risk_shark
  context:
    - risk_assessment

wildcard_nomination:
  description: >
    You have seen the full panel on {ticker}.

    PART 1 — Wildcard lens on {ticker}:
    Is there a special situation angle the other
    sharks missed? Crypto correlation, short squeeze
    potential, M&A speculation, unusual options
    activity? If yes, report it. If no, say so.

    PART 2 — Unsolicited nomination:
    Nominate your best independent trade idea right
    now — the one nobody else is watching. Any
    domain: crypto-correlated, spinoff, squeeze,
    special situation. Give:
    - Ticker
    - Why now (1-2 sentences)
    - Entry range, stop, target
    - Confidence: HIGH / MEDIUM / LOW

    If confidence is HIGH or MEDIUM, call
    "Nominate Ticker" with ticker, thesis,
    source="wildcard_shark", and entry range.
    If you have no strong idea, say so and skip
    the tool call — do not nominate weak ideas.
  expected_output: >
    Part 1: Wildcard angle on {ticker} or "None."
    Part 2: Unsolicited nomination with ticker,
    thesis, levels, confidence. Or "No strong
    unsolicited idea this cycle."
    Confirm: "Nominated [TICKER]" or "No nomination."
  agent: wildcard_shark
  context:
    - hunter_research
    - macro_analysis
    - sentiment_analysis

wildcard_bid:
  description: >
    Your {ticker} wildcard analysis is complete.
    One action only: call "Submit Conviction Bid".
    Positive bid = special situation supports the long.
    Negative bid = wildcard risks outweigh the opportunity.
    Magnitude = strength of the special situation signal.
    Rationale: one sentence from your wildcard lens.
  expected_output: >
    Tool confirmation: "[shark_id] bid [+/-X] pts on [ticker]"
  agent: wildcard_shark
  context:
    - wildcard_nomination

apex_decision:
  description: >
    You are Apex Shark. The full panel has delivered
    on {ticker} at ${current_price}.
    Signal: {signal_type} (value: {signal_value}).
    You are the ONLY shark with decision authority.

    STEP 1: Use "Get Shark Performance History" to
    calibrate how much weight each shark deserves
    based on their historical win rate.

    STEP 2: Use "Get Portfolio State" — check cash
    and open positions before committing capital.

    STEP 3 — EVALUATE THE BIDS (primary input):
    Use "Get Conviction Bids" for {ticker}.
    Each shark has staked real points on their view.
    Read the bids alongside their analysis and decide:
    - Which bids are backed by solid reasoning?
    - Which bids contradict the shark's own report?
    - Is the panel split or aligned?
    You may adopt one bid, multiple bids, or none.
    Name which sharks you are siding with and why.

    STEP 4: Compute panel score from analysis (0-9):
      Hunter: HIGH=3, MED=2, LOW=1
      Research: CHEAP=3, FAIR=2, EXPENSIVE=0
      Macro: GO=3, CAUTION=1, AVOID=0
      Contrarian modifier:
        worry 1-4: -0
        worry 5-6: -1
        worry 7-8: -2
        worry 9-10: -3
    Apply modifiers:
      Risk heat 7-8: -25%
      Risk heat 9-10: -50%
      Contrarian worry 9-10: additional -25%

    STEP 5: Base position size from score:
      7-9: full, 5-6: 75%, 3-4: 50%,
      1-2: 25%, 0: PASS (your call)

    STEP 6: Execute via "Execute Paper Buy" if buying.
    Set sponsored_by to the shark whose bid most
    aligned with your decision. Pass conviction_bids
    as the full dict. If no bids exist, use
    sponsored_by='apex_shark' as fallback.

    STEP 7: Run "Check Stop Losses" on all positions.

    STEP 8: Review unsolicited nominations from Macro,
    Sentiment, Wildcard. If any weren't already
    persisted by their shark, call "Nominate Ticker"
    with source="apex_shark" for the best one.

    STEP 9: State full reasoning.
  expected_output: >
    Decision: BUY [X shares @ ~$Y] | PASS
    Panel score: X/9
    (breakdown: Hunter=X Research=X Macro=X Mod=X)
    Final size: X% of standard
    Bids adopted: [sharks Apex agrees with + why]
    Bids overruled: [sharks Apex disagrees with + why]
    Sponsor: [shark_id] — [one sentence why]
    Stop-loss: $X | Target: $X
    Positions reviewed: [stops triggered if any]
    Watching: [unsolicited nominations]
    Human action: what to do in your real account
  agent: apex_shark
  context:
    - hunter_research
    - research_analysis
    - macro_analysis
    - sentiment_analysis
    - contrarian_challenge
    - risk_assessment
    - wildcard_nomination
